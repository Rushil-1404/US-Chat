<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .bg-wa-green {
      background-color: #25d366;
    }

    .text-wa-green {
      color: #25d366;
    }
  </style>
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-white">
    <header class="shrink-0 pt-14 px-5 pb-4 bg-white z-20">
      <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-bold text-gray-900">Chats</h1>
        <div class="flex gap-4">
          <button id="header-camera" class="text-gray-600 w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
            <iconify-icon icon="lucide:camera" width="24"></iconify-icon>
          </button>
          <div class="relative group">
            <button id="header-more" class="text-gray-600 w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 focus:bg-gray-100 transition-colors outline-none">
              <iconify-icon icon="lucide:more-vertical" width="24"></iconify-icon>
            </button>
            <div class="absolute right-0 top-full mt-2 w-48 bg-white rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.15)] border border-gray-100 py-2 invisible opacity-0 scale-95 origin-top-right group-hover:visible group-hover:opacity-100 group-hover:scale-100 group-focus-within:visible group-focus-within:opacity-100 group-focus-within:scale-100 transition-all duration-200 ease-out z-50">
              <a href="https://p.superdesign.dev/draft/fd94130e-78eb-48e4-a45d-45e8e2e43c72" id="header-logout-link" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 transition-colors">
                <iconify-icon icon="lucide:log-out" width="20"></iconify-icon>
                <span class="text-[15px] font-medium">Logout</span>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="relative group">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
          <iconify-icon icon="lucide:search" class="text-gray-400" width="18"></iconify-icon>
        </div>
        <input type="text" placeholder="Search messages" class="w-full h-11 pl-12 pr-4 bg-gray-100 border-none rounded-xl text-[15px] focus:ring-2 focus:ring-[#25d366] focus:bg-white transition-all outline-none">
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-1 pb-[34px] relative">
      <div class="flex flex-col">
        <a href="https://p.superdesign.dev/draft/3265a695-604f-47c5-b182-fb5981cbc507" id="chat-alex" class="flex items-center gap-4 px-4 py-3 active:bg-gray-100 transition-colors">
          <div class="relative flex-shrink-0">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=100" alt="Alex Rivers" class="w-14 h-14 rounded-full object-cover">
            <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-wa-green border-2 border-white rounded-full"></div>
          </div>
          <div class="flex-1 min-w-0 border-b border-gray-100 pb-3">
            <div class="flex justify-between items-center mb-1">
              <h2 class="text-[16px] font-semibold text-gray-900 truncate">Alex Rivers</h2>
              <span class="text-[12px] text-wa-green font-medium">10:45 AM</span>
            </div>
            <div class="flex justify-between items-center gap-2">
              <p class="text-[14px] text-gray-500 truncate">Budget_Report.xlsx • Excel</p>
              <div class="w-5 h-5 bg-wa-green rounded-full flex items-center justify-center shrink-0">
                <span class="text-[10px] text-white font-bold">2</span>
              </div>
            </div>
          </div>
        </a>

        <a href="https://p.superdesign.dev/draft/3265a695-604f-47c5-b182-fb5981cbc507" id="chat-sarah" class="flex items-center gap-4 px-4 py-3 active:bg-gray-100 transition-colors">
          <div class="flex-shrink-0">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=100" alt="Sarah Miller" class="w-14 h-14 rounded-full object-cover">
          </div>
          <div class="flex-1 min-w-0 border-b border-gray-100 pb-3">
            <div class="flex justify-between items-center mb-1">
              <h2 class="text-[16px] font-semibold text-gray-900 truncate">Sarah Miller</h2>
              <span class="text-[12px] text-gray-400">Yesterday</span>
            </div>
            <div class="flex items-center gap-1">
              <iconify-icon icon="lucide:check-check" class="text-gray-400" width="14"></iconify-icon>
              <p class="text-[14px] text-gray-500 truncate">Let's catch up later tonight!</p>
            </div>
          </div>
        </a>

        <a href="https://p.superdesign.dev/draft/3265a695-604f-47c5-b182-fb5981cbc507" id="chat-jason" class="flex items-center gap-4 px-4 py-3 active:bg-gray-100 transition-colors">
          <div class="flex-shrink-0">
            <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-lg">JK</div>
          </div>
          <div class="flex-1 min-w-0 border-b border-gray-100 pb-3">
            <div class="flex justify-between items-center mb-1">
              <h2 class="text-[16px] font-semibold text-gray-900 truncate">Jason Knight</h2>
              <span class="text-[12px] text-gray-400">Monday</span>
            </div>
            <div class="flex items-center gap-2">
              <iconify-icon icon="lucide:image" class="text-gray-400" width="14"></iconify-icon>
              <p class="text-[14px] text-gray-500 truncate">Photo</p>
            </div>
          </div>
        </a>

        <a href="https://p.superdesign.dev/draft/3265a695-604f-47c5-b182-fb5981cbc507" id="chat-emma" class="flex items-center gap-4 px-4 py-3 active:bg-gray-100 transition-colors">
          <div class="flex-shrink-0">
            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=100" alt="Emma Wilson" class="w-14 h-14 rounded-full object-cover">
          </div>
          <div class="flex-1 min-w-0 border-b border-gray-100 pb-3">
            <div class="flex justify-between items-center mb-1">
              <h2 class="text-[16px] font-semibold text-gray-900 truncate">Emma Wilson</h2>
              <span class="text-[12px] text-gray-400">Oct 24</span>
            </div>
            <p class="text-[14px] text-gray-500 truncate">Can you send me the presentation?</p>
          </div>
        </a>

        <a href="https://p.superdesign.dev/draft/3265a695-604f-47c5-b182-fb5981cbc507" id="chat-mike" class="flex items-center gap-4 px-4 py-3 active:bg-gray-100 transition-colors">
          <div class="flex-shrink-0">
            <div class="w-14 h-14 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 font-bold text-lg">MC</div>
          </div>
          <div class="flex-1 min-w-0 border-b border-gray-100 pb-3">
            <div class="flex justify-between items-center mb-1">
              <h2 class="text-[16px] font-semibold text-gray-900 truncate">Michael Chen</h2>
              <span class="text-[12px] text-gray-400">Oct 22</span>
            </div>
            <p class="text-[14px] text-gray-500 truncate">The meeting was very productive.</p>
          </div>
        </a>
      </div>

      <button id="fab-new-chat" class="fixed bottom-24 right-6 w-14 h-14 bg-wa-green text-white rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-transform z-30">
        <iconify-icon icon="lucide:message-square-plus" width="24"></iconify-icon>
      </button>
    </main>

    <footer class="shrink-0 pb-[34px] bg-white border-t border-gray-100">
      <div class="flex justify-around items-center h-16">
        <a href="https://p.superdesign.dev/draft/000ccec3-e382-4c4d-ae00-8975daeef105" id="nav-chats-link" class="flex flex-col items-center gap-1 text-wa-green">
          <iconify-icon icon="lucide:message-circle" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Chats</span>
        </a>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:phone" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Calls</span>
        </button>
        <a href="https://p.superdesign.dev/draft/d8fb78c9-96dc-4e58-b714-fc1a9c4cc6d3" id="nav-cloud-link" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:cloud" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Cloud</span>
        </a>
        <a href="https://p.superdesign.dev/draft/222a8fc3-5be2-4119-b279-712560d960a1" id="nav-settings-link" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:settings" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Settings</span>
        </a>
      </div>
    </footer>
  </div>
</body>
</html>
