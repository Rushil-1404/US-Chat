<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .bg-wa-green {
      background-color: #25d366;
    }

    .text-wa-green {
      color: #25d366;
    }

    .border-wa-green {
      border-color: #25d366;
    }
  </style>
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-white">
    <header class="shrink-0 pt-14 px-5 pb-4 bg-white border-b border-gray-50 z-20">
      <div class="flex justify-between items-start mb-4">
        <a href="https://p.superdesign.dev/draft/000ccec3-e382-4c4d-ae00-8975daeef105" id="back-to-chats" class="flex flex-col">
          <h1 class="text-2xl font-bold text-gray-900">Shared Cloud</h1>
          <p class="text-[13px] text-gray-500 mt-0.5">OneDrive Storage</p>
        </a>
        <a href="https://svkmmumbai-my.sharepoint.com/:f:/g/personal/rushil_patil198_nmims_in/IgCSd7AP2oHES7EeAcLFgsGhAbwDk9L2Zq2_ugNFWRIoGPE?e=Lynjcy" id="external-onedrive-link" class="w-11 h-11 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full active:scale-95 transition-transform">
          <iconify-icon icon="simple-icons:microsoftonedrive" width="24"></iconify-icon>
        </a>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center text-[12px] font-medium">
          <span class="text-gray-600">4.2 GB of 15 GB used</span>
          <span class="text-wa-green">28%</span>
        </div>
        <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full bg-wa-green rounded-full w-[28%]"></div>
        </div>
      </div>
    </header>

    <div class="shrink-0 flex gap-6 px-5 py-3 overflow-x-auto no-scrollbar border-b border-gray-50 bg-white sticky top-0 z-10">
      <button id="tab-all" class="text-[14px] font-semibold text-wa-green border-b-2 border-wa-green pb-1 whitespace-nowrap">All Files</button>
      <button id="tab-images" class="text-[14px] font-medium text-gray-400 whitespace-nowrap">Images</button>
      <button id="tab-videos" class="text-[14px] font-medium text-gray-400 whitespace-nowrap">Videos</button>
      <button id="tab-docs" class="text-[14px] font-medium text-gray-400 whitespace-nowrap">Docs</button>
    </div>

    <main class="flex-1 overflow-y-auto p-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 group active:scale-[0.98] transition-transform">
          <div class="aspect-square w-full relative">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=300" alt="Mockup preview" class="w-full h-full object-cover">
            <div class="absolute top-2 right-2 bg-black/40 backdrop-blur-sm p-1 rounded-lg text-white text-[10px] font-medium">IMG</div>
          </div>
          <div class="p-3">
            <h3 class="text-[13px] font-semibold text-gray-800 truncate">dashboard_final.png</h3>
            <p class="text-[11px] text-gray-400 mt-0.5">1.2 MB</p>
          </div>
        </div>

        <div class="bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 active:scale-[0.98] transition-transform">
          <div class="aspect-square w-full relative bg-gray-200 flex items-center justify-center">
            <div class="w-12 h-12 rounded-full bg-black/30 flex items-center justify-center text-white backdrop-blur-sm">
              <iconify-icon icon="lucide:play" width="24"></iconify-icon>
            </div>
            <img src="https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&q=80&w=300" alt="Video thumb" class="absolute inset-0 w-full h-full object-cover -z-10">
          </div>
          <div class="p-3">
            <h3 class="text-[13px] font-semibold text-gray-800 truncate">intro_video.mp4</h3>
            <p class="text-[11px] text-gray-400 mt-0.5">24.8 MB</p>
          </div>
        </div>

        <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 flex flex-col justify-between h-[180px] active:scale-[0.98] transition-transform">
          <div class="w-12 h-12 bg-red-50 text-red-500 rounded-xl flex items-center justify-center">
            <iconify-icon icon="lucide:file-text" width="28"></iconify-icon>
          </div>
          <div>
            <h3 class="text-[13px] font-semibold text-gray-800 truncate">project_scope.pdf</h3>
            <p class="text-[11px] text-gray-400 mt-0.5">PDF • 4.5 MB</p>
          </div>
        </div>

        <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 flex flex-col justify-between h-[180px] active:scale-[0.98] transition-transform">
          <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center">
            <iconify-icon icon="lucide:file-spreadsheet" width="28"></iconify-icon>
          </div>
          <div>
            <h3 class="text-[13px] font-semibold text-gray-800 truncate">budget_2024.xlsx</h3>
            <p class="text-[11px] text-gray-400 mt-0.5">Excel • 890 KB</p>
          </div>
        </div>

        <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 flex flex-col justify-between h-[180px] active:scale-[0.98] transition-transform">
          <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center">
            <iconify-icon icon="lucide:presentation" width="28"></iconify-icon>
          </div>
          <div>
            <h3 class="text-[13px] font-semibold text-gray-800 truncate">q1_slides.pptx</h3>
            <p class="text-[11px] text-gray-400 mt-0.5">PPT • 12.1 MB</p>
          </div>
        </div>

        <div class="bg-gray-100/50 rounded-2xl border border-dashed border-gray-200 flex flex-col items-center justify-center h-[180px] text-center p-4">
          <iconify-icon icon="lucide:plus" class="text-gray-300" width="32"></iconify-icon>
          <span class="text-[12px] text-gray-400 mt-2 font-medium">Upload New</span>
        </div>
      </div>
    </main>

    <footer class="shrink-0 pb-[34px] bg-white border-t border-gray-100 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
      <div class="flex justify-around items-center h-16">
        <a href="https://p.superdesign.dev/draft/000ccec3-e382-4c4d-ae00-8975daeef105" id="nav-chats-link" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:message-circle" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Chats</span>
        </a>
        <button id="nav-calls-btn" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:phone" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Calls</span>
        </button>
        <a href="https://p.superdesign.dev/draft/d8fb78c9-96dc-4e58-b714-fc1a9c4cc6d3" id="nav-cloud-btn" class="flex flex-col items-center gap-1 text-wa-green">
          <iconify-icon icon="lucide:cloud" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Cloud</span>
        </a>
        <a href="https://p.superdesign.dev/draft/222a8fc3-5be2-4119-b279-712560d960a1" id="nav-settings-link" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
          <iconify-icon icon="lucide:settings" width="24"></iconify-icon>
          <span class="text-[11px] font-medium">Settings</span>
        </a>
      </div>
    </footer>
  </div>
</body>
</html>
