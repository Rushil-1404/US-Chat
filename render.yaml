services:
  - type: web
    name: your-chat-app
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 100 -b 0.0.0.0:$PORT run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: your-chat-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: AUTO_SEED_DEMO
        value: "false"
      - key: STORAGE_MODE
        value: "local"
      - key: LOCAL_STORAGE_ROOT
        value: "/opt/render/project/src/instance/storage"
      - key: OTP_PROVIDER_MODE
        value: "dev"
      - key: DEV_OTP_EXPOSE_CODE
        value: "true"
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
    disk:
      name: chat-storage
      mountPath: /opt/render/project/src/instance/storage
      sizeGB: 5

databases:
  - name: your-chat-db
    plan: basic-256mb
    databaseName: your_chat
    user: your_chat_user
